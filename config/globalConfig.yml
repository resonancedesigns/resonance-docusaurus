# Pre-build configuration settings
preBuild:
  # Project root directory, relative to the project root directory
  projectRoot: ../
  overwriteExistingFiles: true
  copyMarkdownFromProjectRoot: false
  generateNavBarForPages: false
  defaultTheme: agent

site:
  title: Docusaurus Template
  tagline: Template for Documentation Sites
  url: http://docs-template.subzerodev.com/
  baseUrl: /
  organizationName: The-Running-Dev
  projectName: Docusaurus Template

theme:
  navbar:
    title: Template
    logo:
      alt: Template
      src: img/logo.svg

features:
  giscusComments: true
  gitHubLinks: true
  navBarLinks: true
  badges: true
  themeSwitcher: true
  textSizeSwitcher: true
  readerMode: true
  versionDisplay: true
  cvPage: true
  portfolioPage: true
  portfolioPageAsIndex: false
  projectsPage: true
  dataCaching: true
  adminUI: false

# Configure HTTP sources (served by local API)
projectsPage:
  #source: http://localhost:4000/api/v1/projects
  source: https://the-running-dev.github.io/Data/portfolio/projects.json

portfolioPage:
  #source: http://localhost:4000/api/v1/portfolioData
  source: https://the-running-dev.github.io/Data/portfolio/portfolioData.json

cvPage:
  source: https://the-running-dev.github.io/Data/portfolio/cvData.json